<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>潜入捜査ゲーム</title>
    <!-- 最も安定しているPhaserの本体ファイルのみを読み込み -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        canvas { display: block; margin: 0 auto; }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
const config = {
    type: Phaser.AUTO,
    width: 400,
    height: 600,
    parent: 'game-container',
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);
let player;
let policeNPC;
let spyNPC; 
let cursors;
let msgBox, msgText, promptText;
let choiceBox1, choiceBox2, choiceText1, choiceText2; 

let currentEventTarget = null; 
let isTalking = false;
let isChoosing = false; 
let talkPage = 0;
let hasHintCard = false; 

const policeDialogues = [
    "警察官：\n「よく来てくれた。実は現在、我々警察はある重大な事件の犯人『ミスターX』を追っている…。」",
    "警察官：\n「そこで君に頼みがある。この会場内の各イベントブースに潜む【情報屋】から、ミスターXに関する『ヒントカード』を集めてきてほしい。」",
    "警察官：\n「ただし、情報屋どもは口が固い。彼らの信用を得るためには、各ブースで提示される【ミッション】を達成する必要があるだろう。」",
    "警察官：\n「無事にヒントカードを手に入れたら、またここに戻ってきて私に報告してくれ。頼んだぞ！」"
];

let btnUp, btnDown, btnLeft, btnRight, btnA;

function preload() {
    // 外部画像の読み込み（this.load.image）をすべて削除しました。
    // これにより、通信エラーによる画面真っ黒（フリーズ）を100%防ぎます。
}

function create() {
    // 画像の代わりに、Phaser内部の機能で「色付きの丸や四角」を直接描画します
    
    // 1. 男性警察官（水色の四角）
    policeNPC = this.add.rectangle(200, 150, 32, 32, 0x00aaff);
    this.add.text(165, 110, '男性警察官', { fontSize: '12px', fill: '#fff' });

    // 2. 情報屋ブース（黄緑色の四角）
    spyNPC = this.add.rectangle(80, 250, 32, 32, 0x55ff55);
    this.add.text(50, 210, '情報屋ブース', { fontSize: '12px', fill: '#ffcc00' });

    // 3. プレイヤー（あなた・赤色の丸）
    player = this.add.circle(200, 350, 16, 0xff3333);

    cursors = this.input.keyboard.createCursorKeys();

    // 5. メッセージウィンドウ
    msgBox = this.add.rectangle(200, 500, 360, 120, 0x000055).setStrokeStyle(3, 0xffffff).setAlpha(0);
    msgText = this.add.text(40, 460, '', { fontSize: '14px', fill: '#fff', wordWrap: { width: 320 }, lineSpacing: 6 }).setAlpha(0);
    promptText = this.add.text(340, 535, '▼', { fontSize: '14px', fill: '#fff' }).setAlpha(0);

    // 6. 選択肢
    choiceBox1 = this.add.rectangle(120, 410, 120, 40, 0x000055).setStrokeStyle(2, 0xffffff).setAlpha(0).setInteractive();
    choiceText1 = this.add.text(95, 400, '1: 挑戦する', { fontSize: '14px', fill: '#fff' }).setAlpha(0);
    
    choiceBox2 = this.add.rectangle(280, 410, 120, 40, 0x000055).setStrokeStyle(2, 0xffffff).setAlpha(0).setInteractive();
    choiceText2 = this.add.text(255, 400, '2: やめる', { fontSize: '14px', fill: '#fff' }).setAlpha(0);

    setupChoiceButtons();
    createMobileControls(this);
}

function update() {
    if (isTalking || isChoosing) return; 

    let speed = 4;
    if (cursors.left.isDown || (btnLeft && btnLeft.isDown)) player.x -= speed;
    else if (cursors.right.isDown || (btnRight && btnRight.isDown)) player.x += speed;

    if (cursors.up.isDown || (btnUp && btnUp.isDown)) player.y -= speed;
    else if (cursors.down.isDown || (btnDown && btnDown.isDown)) player.y += speed;
}

function setupChoiceButtons() {
    choiceBox1.on('pointerdown', () => {
        hideChoices();
        msgText.setText("情報屋：\n「いい度胸だ。では【実際のイベントブースの展示】を見て、ミスターXの靴の色を確認してくるんだ！それが君のミッションだ。クリアしたらカードをやろう」");
        hasHintCard = true; 
        promptText.setAlpha(1).setText('●');
    });

    choiceBox2.on('pointerdown', () => {
        hideChoices();
        msgText.setText("情報屋：\n「冷やかしなら帰んな。ミスターXの情報が欲しくなったらまた来な。」");
        promptText.setAlpha(1).setText('●');
    });
}

function showChoices() {
    isChoosing = true;
    choiceBox1.setAlpha(1); choiceText1.setAlpha(1);
    choiceBox2.setAlpha(1); choiceText2.setAlpha(1);
}

function hideChoices() {
    isChoosing = false;
    choiceBox1.setAlpha(0); choiceText1.setAlpha(0);
    choiceBox2.setAlpha(0); choiceText2.setAlpha(0);
}

function createMobileControls(scene) {
    const btnColor = 0x555555;
    
    btnUp = scene.add.circle(100, 400, 25, btnColor).setInteractive();
    btnDown = scene.add.circle(100, 500, 25, btnColor).setInteractive();
    btnLeft = scene.add.circle(50, 450, 25, btnColor).setInteractive();
    btnRight = scene.add.circle(150, 450, 25, btnColor).setInteractive();
    
    btnA = scene.add.circle(320, 450, 35, 0xcc0000).setInteractive();
    scene.add.text(312, 438, 'A', { fontSize: '24px', fill: '#fff', fontWeight: 'bold' });

    setupNavButton(btnUp); setupNavButton(btnDown); setupNavButton(btnLeft); setupNavButton(btnRight);

    btnA.on('pointerdown', () => {
        if (isChoosing) return; 

        let distToPolice = Phaser.Math.Distance.Between(player.x, player.y, policeNPC.x, policeNPC.y);
        let distToSpy = Phaser.Math.Distance.Between(player.x, player.y, spyNPC.x, spyNPC.y);
        
        if (isTalking) {
            if (currentEventTarget === 'police') {
                talkPage++;
                if (talkPage < policeDialogues.length) {
                    msgText.setText(policeDialogues[talkPage]);
                    if (talkPage === policeDialogues.length - 1) promptText.setText('●');
                } else {
                    closeDialogue();
                }
            } else if (currentEventTarget === 'spy' || currentEventTarget === 'police_end') {
                closeDialogue();
            }
        } 
        else if (distToPolice < 50) {
            isTalking = true;
            msgBox.setAlpha(1); msgText.setAlpha(1);
            
            if (hasHintCard) {
                currentEventTarget = 'police_end';
                msgText.setText("警察官：\n「おお！情報屋からヒントカードを勝ち取ってきたな！さすがは優秀な捜査官だ。これでミスターXの逮捕に一歩近づいたぞ！」");
                promptText.setAlpha(1).setText('●');
            } else {
                currentEventTarget = 'police';
                talkPage = 0;
                promptText.setAlpha(1).setText('▼');
                msgText.setText(policeDialogues[talkPage]);
            }
        } 
        else if (distToSpy < 50) {
            isTalking = true;
            currentEventTarget = 'spy';
            msgBox.setAlpha(1); msgText.setAlpha(1);
            
            if (hasHintCard) {
                msgText.setText("情報屋：\n「ミッションの件は伝えたはずだ。さあ、手に入れたヒントカードを早く警察官のところに持っていきな。」");
                promptText.setAlpha(1).setText('●');
            } else {
                msgText.setText("情報屋：\n「おいおい、警察の回し者が何の用だ？…ミスターXの情報が欲しい？フン、タダでは教えられんな。俺の【ミッション】に挑戦するか？」");
                promptText.setAlpha(0); 
                showChoices(); 
            }
        }
    });
}

function closeDialogue() {
    msgBox.setAlpha(0); msgText.setAlpha(0); promptText.setAlpha(0);
    isTalking = false;
    currentEventTarget = null;
}

function setupNavButton(button) {
    button.isDown = false;
    button.on('pointerdown', () => { button.isDown = true; button.setFillStyle(0x888888); });
    button.on('pointerup', () => { button.isDown = false; button.setFillStyle(0x555555); });
    button.on('pointerout', () => { button.isDown = false; button.setFillStyle(0x555555); });
}
</script>

</body>
</html>
