<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>潜入捜査ゲーム</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: sans-serif; }
        
        #game-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; max-width: 400px; height: 100%; max-height: 600px;
            background-color: #111122; border: 2px solid #333; overflow: hidden;
        }

        .character { position: absolute; width: 32px; height: 32px; border-radius: 4px; font-size: 10px; color: #fff; text-align: center; line-height: 32px; font-weight: bold; }
        
        /* 🚨 プレイヤーの設定をドット絵用に大幅に改良 🚨 */
        #player { 
            width: 32px; 
            height: 32px; 
            z-index: 10;
            /* アップロードした player.png を背景に指定 */
            background-image: url('player.png');
            /* 画像を綺麗にドットのまま拡大縮小するレトロゲーム用設定 */
            background-repeat: no-repeat;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            /* 画像全体のサイズ（元画像が幅約96px、縦約128pxと仮定し32pxのグリッドに最適化） */
            background-size: 96px 128px;
            /* 初期位置は「正面を向いて立ち止まっている（中央上）」 */
            background-position: -32px 0px;
        }
        
        #police { background-color: #00aaff; left: 184px; top: 150px; }
        #spy { background-color: #55ff55; left: 80px; top: 250px; color: #000; }

        .label { position: absolute; width: 80px; text-align: center; color: #fff; font-size: 11px; transform: translateX(-24px); }

        #msg-box {
            position: absolute; bottom: 140px; left: 5%; width: 90%; height: 110px;
            background: linear-gradient(to bottom, #000066, #000033);
            border: 3px solid #fff; border-radius: 6px; box-shadow: 0 0 0 2px #000;
            padding: 12px; color: #fff; font-size: 13px; line-height: 1.5;
            display: none; z-index: 20;
        }
        #prompt-icon { position: absolute; bottom: 5px; right: 10px; font-size: 12px; animation: blink 0.8s infinite; }

        #choices-area { position: absolute; bottom: 260px; left: 5%; width: 90%; display: none; justify-content: space-around; z-index: 25; }
        .choice-btn { background: #000055; border: 2px solid #fff; color: #fff; padding: 8px 16px; border-radius: 4px; font-size: 13px; cursor: pointer; }

        #controls { position: absolute; bottom: 10px; left: 0; width: 100%; height: 120px; display: flex; justify-content: space-between; padding: 0 20px; align-items: center; z-index: 30; }
        #d-pad { position: relative; width: 100px; height: 100px; }
        .pad-btn { position: absolute; width: 34px; height: 34px; background-color: #555; border: 1px solid #777; border-radius: 6px; }
        .pad-btn:active { background-color: #888; }
        #btn-up { top: 0; left: 33px; }
        #btn-down { bottom: 0; left: 33px; }
        #btn-left { top: 33px; left: 0; }
        #btn-right { top: 33px; right: 0; }
        
        #btn-a { width: 60px; height: 60px; background-color: #cc0000; border: 2px solid #fff; border-radius: 50%; color: #fff; font-size: 20px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px #880000; cursor: pointer; }
        #btn-a:active { transform: translateY(4px); box-shadow: none; }

        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<div id="game-screen">
    <div style="position: absolute; left: 184px; top: 130px;" class="label">男性警察官</div>
    <div id="police" class="character">警</div>
    
    <div style="position: absolute; left: 80px; top: 230px;" class="label">情報屋</div>
    <div id="spy" class="character">情</div>
    
    <!-- プレイヤーの文字を消去し、ドット絵画像だけが表示されるように修正 -->
    <div id="player" class="character"></div>

    <div id="choices-area">
        <button class="choice-btn" onclick="selectChoice(1)">1: 挑戦する</button>
        <button class="choice-btn" onclick="selectChoice(2)">2: やめる</button>
    </div>

    <div id="msg-box">
        <div id="msg-text"></div>
        <div id="prompt-icon">▼</div>
    </div>

    <div id="controls">
        <div id="d-pad">
            <button id="btn-up" class="pad-btn"></button>
            <button id="btn-down" class="pad-btn"></button>
            <button id="btn-left" class="pad-btn"></button>
            <button id="btn-right" class="pad-btn"></button>
        </div>
        <button id="btn-a">A</button>
    </div>
</div>

<script>
const pElem = document.getElementById('player');
let pX = 184; 
let pY = 320; 
pElem.style.left = pX + 'px';
pElem.style.top = pY + 'px';

let isTalking = false;
let isChoosing = false;
let talkPage = 0;
let currentTarget = null;
let hasHintCard = false;

// アニメーション用変数
let animFrame = 0;
let currentDirection = 'down';

const policeDialogues = [
    "警察官：<br>「よく来てくれた。実は現在、我々警察はある重大な事件の犯人『ミスターX』を追っている…。」",
    "警察官：<br>「お前に頼みがある。この会場内の各イベントブースに潜む【情報屋】から、ミスターXに関する『ヒントカード』を集めてきてほしい。」",
    "警察官：<br>「ただし、情報屋どもは口が固い。彼らの信用を得るためには、各ブースで提示される【ミッション】を達成する必要があるだろう。」",
    "警察官：<br>「無事にヒントカードを手に入れたら、またここに戻ってきて私に報告してくれ。頼んだぞ！」"
];

// 🚨 【新機能】向きと歩行アニメーションに応じて表示画像を切り替える関数 🚨
function updatePlayerGraphic(dir, isMoving) {
    currentDirection = dir;
    
    // スプライトシートの縦位置（Y軸）を指定（上:3列目, 下:1列目, 左:2列目, 右:4列目）
    let row = 0;
    if (dir === 'down') row = 0;
    if (dir === 'left') row = 1;
    if (dir === 'right') row = 2;
    if (dir === 'up') row = 3;
    
    // 横位置（X軸）：立ち止まっている時は中央、動いている時は左右の足を交互に出す
    let col = 1; // 中央（直立）
    if (isMoving) {
        animFrame = (animFrame + 1) % 4;
        // 0か2なら左足、1なら直立、3なら右足
        if (animFrame === 0) col = 0;
        if (animFrame === 1 || animFrame === 3) col = 1;
        if (animFrame === 2) col = 2;
    }
    
    // CSSのbackground-positionを書き換えて、表示する画像の位置をズラす（32px単位）
    pElem.style.backgroundPosition = `-${col * 32}px -${row * 32}px`;
}

let moveInterval = null;
function startMove(dx, dy, dir) {
    if (isTalking || isChoosing) return;
    if (moveInterval) clearInterval(moveInterval);
    moveInterval = setInterval(() => {
        pX = Math.max(10, Math.min(358, pX + dx));
        pY = Math.max(10, Math.min(430, pY + dy));
        pElem.style.left = pX + 'px';
        pElem.style.top = pY + 'px';
        
        // 移動中のアニメーション更新
        updatePlayerGraphic(dir, true);
    }, 25);
}
function stopMove() { 
    clearInterval(moveInterval); 
    // 立ち止まったら直立不動にする
    updatePlayerGraphic(currentDirection, false);
}

const setupBtn = (id, dx, dy, dir) => {
    const btn = document.getElementById(id);
    btn.addEventListener('touchstart', (e) => { e.preventDefault(); startMove(dx, dy, dir); });
    btn.addEventListener('mousedown', () => startMove(dx, dy, dir));
};
setupBtn('btn-up', 0, -5, 'up');
setupBtn('btn-down', 0, 5, 'down');
setupBtn('btn-left', -5, 0, 'left');
setupBtn('btn-right', 5, 0, 'right');

window.addEventListener('touchend', stopMove);
window.addEventListener('mouseup', stopMove);

// PCキーボード操作の連動
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.key] = true; if(e.key === ' ' || e.key === 'z') handleAction(); });
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

setInterval(() => {
    if (isTalking || isChoosing) return;
    let speed = 4;
    let moving = false;
    let dir = currentDirection;

    if (keys['ArrowUp'] || keys['w']) { pY = Math.max(10, pY - speed); dir = 'up'; moving = true; }
    else if (keys['ArrowDown'] || keys['s']) { pY = Math.min(430, pY + speed); dir = 'down'; moving = true; }
    
    if (keys['ArrowLeft'] || keys['a']) { pX = Math.max(10, pX - speed); dir = 'left'; moving = true; }
    else if (keys['ArrowRight'] || keys['d']) { pX = Math.min(358, pX + speed); dir = 'right'; moving = true; }
    
    if (moving) {
        pElem.style.left = pX + 'px'; pElem.style.top = pY + 'px';
        updatePlayerGraphic(dir, true);
    } else {
        updatePlayerGraphic(currentDirection, false);
    }
}, 25);

document.getElementById('btn-a').addEventListener('click', handleAction);

function handleAction() {
    if (isChoosing) return;

    const msgBox = document.getElementById('msg-box');
    const msgText = document.getElementById('msg-text');
    const promptIcon = document.getElementById('prompt-icon');

    const distToPolice = Math.hypot(pX - 184, pY - 150);
    const distToSpy = Math.hypot(pX - 80, pY - 250);

    if (isTalking) {
        if (currentTarget === 'police') {
            talkPage++;
            if (talkPage < policeDialogues.length) {
                msgText.innerHTML = policeDialogues[talkPage];
                if (talkPage === policeDialogues.length - 1) promptIcon.innerHTML = '●';
            } else {
                closeDialogue();
            }
        } else {
            closeDialogue();
        }
    } 
    else if (distToPolice < 40) {
        isTalking = true;
        msgBox.style.display = 'block';
        updatePlayerGraphic('up', false); // 話しかける時は相手の方向（上）を向く
        if (hasHintCard) {
            currentTarget = 'police_end';
            msgText.innerHTML = "警察官：<br>「おお！情報屋からヒントカードを勝ち取ってきたな！さすがは優秀な捜査官だ。これでミスターXの逮捕に一歩近づいたぞ！」";
            promptIcon.innerHTML = '●';
        } else {
            currentTarget = 'police';
            talkPage = 0;
            msgText.innerHTML = policeDialogues[talkPage];
            promptIcon.innerHTML = '▼';
        }
    } 
    else if (distToSpy < 40) {
        isTalking = true;
        msgBox.style.display = 'block';
        updatePlayerGraphic('left', false); // 話しかける時は相手の方向（左）を向く
        if (hasHintCard) {
            currentTarget = 'spy_end';
            msgText.innerHTML = "情報屋：<br>「ミッションの件は伝えたはずだ。さあ、手に入れたヒントカードを早く警察官のところに持っていきな。」";
